<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AingA.I. — Indigenous Language Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --text-primary: #3D3D3D;
    --text-secondary: #6E6E6E;
    --bg: #FFFFFF;
    --grid: rgba(66, 133, 244, 0.45);
    --grid-soft: rgba(66, 133, 244, 0.22);
    /* AingA.I. brand gradient */
    --grad: linear-gradient(90deg,
      #F79035 0%,
      #F37641 14%,
      #F05D4D 28%,
      #D23B96 42%,
      #C04599 56%,
      #A54D9D 70%,
      #7166AE 85%,
      #5B65AF 100%);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Manrope', Arial, Helvetica, sans-serif;
    color: var(--text-primary);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Full screen hero */
  .hero {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #FFFFFF;
  }

  /* 3D perspective room — behind everything */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    /* Radial vignette mask */
    -webkit-mask-image: radial-gradient(
      ellipse 75% 75% at 50% 50%,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.3) 22%,
      rgba(0,0,0,1) 55%,
      rgba(0,0,0,1) 75%,
      rgba(0,0,0,0) 100%
    );
    mask-image: radial-gradient(
      ellipse 75% 75% at 50% 50%,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0.3) 22%,
      rgba(0,0,0,1) 55%,
      rgba(0,0,0,1) 75%,
      rgba(0,0,0,0) 100%
    );
  }

  .scene svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Character videos flanking hero content — aligned bottom, equal height */
  .character {
    position: absolute;
    bottom: 0;
    height: 72vh;
    max-height: 820px;
    width: auto;
    z-index: 1;
    pointer-events: none;
    object-fit: contain;
    object-position: bottom center;
  }

  .character.left  { left: 2vw; }
  .character.right { right: 2vw; }

  @media (max-width: 1100px) {
    .character { height: 60vh; }
  }

  @media (max-width: 900px) {
    .character { height: 48vh; opacity: 0.9; }
  }

  @media (max-width: 640px) {
    .character { display: none; }
  }

  /* NAV */
  .nav {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 24px 48px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    justify-self: start;
  }

  .nav-logo img {
    height: 48px;
    width: auto;
    display: block;
  }

  .nav-links {
    display: flex;
    gap: 48px;
    list-style: none;
    justify-self: center;
  }

  .nav-links a {
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s ease;
    letter-spacing: -0.01em;
  }

  .nav-links a:hover {
    color: var(--text-primary);
  }

  /* Nav right side (Log in + burger) */
  .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-self: end;
  }

  .nav-login {
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 999px;
    border: 1.5px solid rgba(61, 61, 61, 0.2);
    transition: border-color 0.2s ease, background 0.2s ease;
    letter-spacing: -0.01em;
  }

  .nav-login:hover {
    border-color: var(--text-primary);
    background: rgba(61, 61, 61, 0.04);
  }

  /* Hidden checkbox drives the mobile menu */
  .menu-toggle {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  /* Burger button */
  .burger {
    display: none;
    width: 44px;
    height: 44px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    border: 1.5px solid rgba(61, 61, 61, 0.15);
    background: transparent;
    position: relative;
    transition: border-color 0.2s ease;
  }

  .burger:hover { border-color: rgba(61, 61, 61, 0.4); }

  .burger span {
    position: absolute;
    left: 11px;
    right: 11px;
    height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: transform 0.3s ease, opacity 0.2s ease, top 0.3s ease;
  }
  .burger span:nth-child(1) { top: 14px; }
  .burger span:nth-child(2) { top: 21px; }
  .burger span:nth-child(3) { top: 28px; }

  /* Mobile full-screen nav overlay */
  .mobile-nav {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 32px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    visibility: hidden;
  }

  .menu-toggle:checked ~ .mobile-nav {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
    visibility: visible;
  }

  .mobile-nav-top {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 32px;
  }

  .close-menu {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    cursor: pointer;
    color: var(--text-primary);
    font-size: 24px;
    font-weight: 400;
    border: 1.5px solid rgba(61, 61, 61, 0.15);
    transition: border-color 0.2s ease;
    line-height: 1;
  }
  .close-menu:hover { border-color: rgba(61, 61, 61, 0.4); }

  .mobile-nav-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0;
    margin: 0;
    flex: 1;
  }

  .mobile-nav-links a {
    font-family: 'Manrope', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.02em;
    padding: 14px 8px;
    display: block;
    border-bottom: 1px solid rgba(61, 61, 61, 0.08);
  }

  .mobile-nav-login {
    display: block;
    width: 100%;
    text-align: center;
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    background: #FFFFFF;
    border-radius: 14px;
    padding: 18px 24px;
    text-decoration: none;
    margin-top: 24px;
    position: relative;
    box-shadow: inset 0 0 0 2px transparent;
    background-image:
      linear-gradient(#FFFFFF, #FFFFFF),
      var(--grad);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    border: 2px solid transparent;
  }

  /* HERO CONTENT */
  .hero-content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px 80px;
  }

  h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 80px;
    font-weight: 600;
    line-height: 1.05;
    letter-spacing: -0.035em;
    color: var(--text-primary);
    max-width: 900px;
  }

  h1 .sparkle {
    display: inline-block;
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-left: 4px;
    font-size: 0.6em;
    vertical-align: super;
  }

  .subtitle {
    font-family: 'Manrope', sans-serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text-secondary);
    margin-top: 28px;
    max-width: 560px;
    letter-spacing: -0.01em;
  }

  /* CTA Button with gradient border */
  .cta-wrap {
    margin-top: 44px;
    position: relative;
    display: inline-block;
    padding: 2px;
    border-radius: 999px;
    background: var(--grad);
    box-shadow: 0 10px 30px -10px rgba(210, 59, 150, 0.35);
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 999px;
    background: #FFFFFF;
    color: var(--text-primary);
    font-family: 'Manrope', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: -0.01em;
    transition: transform 0.2s ease, background 0.2s ease;
    border: none;
    cursor: pointer;
  }

  .cta:hover {
    transform: translateY(-1px);
  }

  .cta-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--text-primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 14px;
    line-height: 1;
  }

  /* ========== ENTRANCE ANIMATIONS ==========
     Timeline (seconds):
       0.0 → 1.2  grid grows + fades in
       1.2 → 2.6  h1 words stagger in
       2.6 → 3.0  subtitle fades in
       3.0 → 3.4  CTA pops in
       3.3 → 4.1  characters bounce up from bottom
       4.0 → 4.6  nav slides down + fades in
  */

  /* Grid: scale up and fade in */
  .scene {
    animation: gridGrowIn 1.2s cubic-bezier(0.2, 0.8, 0.25, 1) both;
  }
  @keyframes gridGrowIn {
    0%   { opacity: 0; transform: scale(0.35); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: scale(1); }
  }

  /* H1: hide by default, each word animates individually */
  h1 .word,
  h1 .sparkle {
    display: inline-block;
    opacity: 0;
    transform: translateY(28px);
    filter: blur(6px);
    animation: wordIn 0.55s cubic-bezier(0.2, 0.8, 0.25, 1) both;
    animation-delay: calc(1.2s + var(--i, 0) * 0.14s);
  }
  @keyframes wordIn {
    0%   { opacity: 0; transform: translateY(28px); filter: blur(6px); }
    60%  { opacity: 1; filter: blur(0); }
    100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }

  /* Subtitle */
  .subtitle {
    opacity: 0;
    transform: translateY(14px);
    animation: fadeRise 0.6s ease-out 2.6s both;
  }
  @keyframes fadeRise {
    to { opacity: 1; transform: translateY(0); }
  }

  /* CTA — pop */
  .cta-wrap {
    opacity: 0;
    transform: scale(0.85) translateY(8px);
    animation: ctaPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 3.0s both;
  }
  @keyframes ctaPop {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Characters — bounce up from bottom */
  .character {
    animation: charBounceUp 0.9s cubic-bezier(0.22, 1.4, 0.36, 1) both;
  }
  .character.left  { animation-delay: 3.3s; }
  .character.right { animation-delay: 3.45s; }
  @keyframes charBounceUp {
    0%   { transform: translateY(105%); opacity: 0; }
    55%  { opacity: 1; }
    70%  { transform: translateY(-4%); }
    85%  { transform: translateY(1.5%); }
    100% { transform: translateY(0);    opacity: 1; }
  }

  /* Header — fade + slide down, right after characters */
  .nav {
    opacity: 0;
    transform: translateY(-60px);
    animation: navDrop 0.6s cubic-bezier(0.2, 0.8, 0.25, 1) 4.1s both;
  }
  @keyframes navDrop {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Respect users who prefer less motion */
  @media (prefers-reduced-motion: reduce) {
    .scene, h1 .word, h1 .sparkle, .subtitle, .cta-wrap, .character, .nav {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      filter: none !important;
    }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .nav {
      padding: 20px 24px;
      grid-template-columns: auto 1fr;  /* logo + right side only */
    }
    .nav-logo img { height: 40px; }
    .nav-links { display: none; }       /* hide inline links */
    .nav-login { display: none; }       /* hide inline login; it moves into popup */
    .burger { display: inline-flex; }   /* show hamburger */
    .character { display: none; }       /* hide character videos on mobile */
    h1 { font-size: 48px; }
    .subtitle { font-size: 18px; margin-top: 20px; }
    .cta-wrap { margin-top: 32px; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 36px; }
    .subtitle { font-size: 16px; }
    .mobile-nav-links a { font-size: 24px; }
  }
</style>
</head>

  <script>
    // Generate one-point perspective 3D room grid
    (function () {
      const svg = document.getElementById('grid-svg');
      const NS = 'http://www.w3.org/2000/svg';

      function build() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        svg.innerHTML = '';

        // Back wall inset (as % of viewport)
        const insetX = W * 0.26;
        const insetY = H * 0.26;
        const bwL = insetX;
        const bwT = insetY;
        const bwR = W - insetX;
        const bwB = H - insetY;

        const DIVS = 20;        // subdivisions on back wall
        const DEPTH_DIVS = 9;   // "ring" lines between back wall and viewport edge

        const STROKE = 'rgba(66, 133, 244, 0.55)';
        const STROKE_SOFT = 'rgba(66, 133, 244, 0.35)';

        function line(x1, y1, x2, y2, soft) {
          const l = document.createElementNS(NS, 'line');
          l.setAttribute('x1', x1);
          l.setAttribute('y1', y1);
          l.setAttribute('x2', x2);
          l.setAttribute('y2', y2);
          l.setAttribute('stroke', soft ? STROKE_SOFT : STROKE);
          l.setAttribute('stroke-width', '1');
          l.setAttribute('vector-effect', 'non-scaling-stroke');
          svg.appendChild(l);
        }

        // ===== BACK WALL =====
        // Vertical lines
        for (let i = 0; i <= DIVS; i++) {
          const x = bwL + (bwR - bwL) * (i / DIVS);
          line(x, bwT, x, bwB);
        }
        // Horizontal lines
        for (let i = 0; i <= DIVS; i++) {
          const y = bwT + (bwB - bwT) * (i / DIVS);
          line(bwL, y, bwR, y);
        }

        // ===== FLOOR =====
        // Radiating lines (from each back-wall vertical point out to the viewport bottom edge)
        for (let i = 0; i <= DIVS; i++) {
          const t = i / DIVS;
          const xInner = bwL + t * (bwR - bwL);
          const xOuter = t * W;
          line(xInner, bwB, xOuter, H);
        }
        // Ring lines (parallel to back wall bottom)
        for (let i = 1; i <= DEPTH_DIVS; i++) {
          const t = i / DEPTH_DIVS;
          const y = bwB + t * (H - bwB);
          const leftX = bwL + t * (0 - bwL);
          const rightX = bwR + t * (W - bwR);
          line(leftX, y, rightX, y, true);
        }

        // ===== CEILING =====
        for (let i = 0; i <= DIVS; i++) {
          const t = i / DIVS;
          const xInner = bwL + t * (bwR - bwL);
          const xOuter = t * W;
          line(xInner, bwT, xOuter, 0);
        }
        for (let i = 1; i <= DEPTH_DIVS; i++) {
          const t = i / DEPTH_DIVS;
          const y = bwT + t * (0 - bwT);
          const leftX = bwL + t * (0 - bwL);
          const rightX = bwR + t * (W - bwR);
          line(leftX, y, rightX, y, true);
        }

        // ===== LEFT WALL =====
        // Radiating horizontal lines
        for (let i = 0; i <= DIVS; i++) {
          const t = i / DIVS;
          const yInner = bwT + t * (bwB - bwT);
          const yOuter = t * H;
          line(bwL, yInner, 0, yOuter);
        }
        // Ring lines (vertical lines across left wall)
        for (let i = 1; i <= DEPTH_DIVS; i++) {
          const t = i / DEPTH_DIVS;
          const x = bwL + t * (0 - bwL);
          const topY = bwT + t * (0 - bwT);
          const botY = bwB + t * (H - bwB);
          line(x, topY, x, botY, true);
        }

        // ===== RIGHT WALL =====
        for (let i = 0; i <= DIVS; i++) {
          const t = i / DIVS;
          const yInner = bwT + t * (bwB - bwT);
          const yOuter = t * H;
          line(bwR, yInner, W, yOuter);
        }
        for (let i = 1; i <= DEPTH_DIVS; i++) {
          const t = i / DEPTH_DIVS;
          const x = bwR + t * (W - bwR);
          const topY = bwT + t * (0 - bwT);
          const botY = bwB + t * (H - bwB);
          line(x, topY, x, botY, true);
        }
      }

      build();
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(build, 100);
      });
    })();
  </script>
</body>
